name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'LICENSE', 'examples/**', 'docs/**']
  pull_request:
    paths-ignore: ['**/*.md', 'LICENSE', 'examples/**', 'docs/**']
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ShellCheck (lint all tools)
        run: shellcheck toolkit/*.sh

  smoke:
    # Validate the tool on both supported OSes (macOS-first, Linux-portable).
    # Windows is intentionally excluded — the tool relies on Unix tooling
    # (arp / dns-sd / smbutil) and does not target Windows.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check (all tools)
        run: for f in toolkit/*.sh; do bash -n "$f"; done

      - name: Smoke — authorization gate + negative controls must bite
        run: |
          set -e
          chmod +x toolkit/lan-recon.sh

          echo "→ dry-run with proper authorization should succeed"
          ./toolkit/lan-recon.sh --subnet 192.168.1.0/24 --yes \
            --authorized-by "CI test" --dry-run

          echo "→ --yes WITHOUT --authorized-by must FAIL (gate bites)"
          if ./toolkit/lan-recon.sh --subnet 192.168.1.0/24 --yes --dry-run 2>/dev/null; then
            echo "FAIL: authorization gate did not bite"; exit 1
          fi

          echo "→ no subnet must FAIL"
          if ./toolkit/lan-recon.sh --yes --authorized-by x --dry-run 2>/dev/null; then
            echo "FAIL: ran with no target"; exit 1
          fi

          echo "PASS: authorization gate + negative controls bite on ${{ matrix.os }}"

      - name: Smoke — external-surface.sh gate bites
        run: |
          set -e
          chmod +x toolkit/external-surface.sh
          ./toolkit/external-surface.sh --target 192.0.2.1 --yes --authorized-by "CI" --dry-run
          if ./toolkit/external-surface.sh --target 192.0.2.1 --yes --dry-run 2>/dev/null; then
            echo "FAIL: external-surface gate did not bite"; exit 1
          fi
          echo "PASS: external-surface gate bites"

      - name: Smoke — report-gen.sh assembles a report
        run: |
          set -e
          chmod +x toolkit/report-gen.sh
          printf '# LAN Inventory\n\n| IP | MAC | Vendor (OUI) | Open ports | Name | Notes |\n|---|---|---|---|---|---|\n| 192.0.2.10 | aa:bb:cc:00:11:22 | Example | 22,443 | host-a | |\n' > /tmp/inv.md
          # (a) empty findings (only the template row) must STILL produce a report
          ./toolkit/report-gen.sh --inventory /tmp/inv.md --findings templates/findings-register.csv --client "CI Client" --out /tmp/report.md
          grep -q "Network Security Assessment" /tmp/report.md
          grep -q "192.0.2.10" /tmp/report.md
          # (b) with a real finding, the finding must be expanded
          cp templates/findings-register.csv /tmp/find.csv
          printf 'NS-101,"Test finding","192.0.2.10","exposed-service","Medium","Med","VERIFIED","port open","impact","fix it","Low","Open"\n' >> /tmp/find.csv
          ./toolkit/report-gen.sh --inventory /tmp/inv.md --findings /tmp/find.csv --client "CI" --out /tmp/report2.md
          grep -q "NS-101" /tmp/report2.md
          echo "PASS: report-gen assembles a report (empty + with-findings)"
